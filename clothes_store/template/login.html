<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothes Shop</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://kit.fontawesome.com/304058e96a.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" href="static/assets/logo.png">
    <link href="{{ url_for('static', filename='css/create_style.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/tooltip.css') }}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body >
    <div class="login-container">
        <div class="login-card">
            <div class="goback">
                
                <a href="/"><i class="fa-solid fa-arrow-left"></i> Go back</a>
            </div>
            <header class="card-header">
                <span class="brand-badge">Clothes Shop Dashboard</span>
                <h2>Welcome!</h2>
                <p class="subtitle">Please provide your details to login</p>
            </header>
            <div id="g_id_onload"
                data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
                data-context="signin"
                data-ux_mode="popup"
                data-callback="handleCredentialResponse"
                data-auto_prompt="false">
            </div>

            <div class="g_id_signin"
                data-type="standard"
                data-shape="rectangular"
                data-theme="outline"
                data-text="signin_with"
                data-size="large"
                data-logo_alignment="left"
                style="display: inline-block;">
            </div>
            <form action="/sign-in" method="post" id="loginForm"class="login-form">

                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div id="error">

                </div>

                <div class="form-group">
                    <label for="pass">Password</label>
                    <input type="password" id="pass" name="pass" placeholder="••••••••" required>
                </div>

                <div class="form-actions">
                    <a href="/forgot.html" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="submit-btn">Sign in</button>
            </form>

            <footer class="card-footer">
                <p>Don't have an account? <a href="create.html" class="login-link">Create account</a></p>
            </footer>
        </div>
    </div>
    
    
<script src="/docs/5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" class="astro-vvvwv3sm"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
<script src="{{ url_for('static', filename='js/login.js') }}" defer></script>

</html>
